<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:;">
  <title>Pixel Agent Buddy</title>
  <link rel="stylesheet" href="css/pet-2d.css">
</head>
<body>
  <main id="pet-stage" data-state="idle" data-agent="claude-code" aria-label="Pixel Agent Buddy">
    <section id="status-bubble" class="status-bubble" aria-live="polite">
      <span id="agent-badge">CLAUDE CODE</span>
      <strong id="status-title">准备就绪</strong>
      <span id="status-detail">等待 Claude Code / Codex 事件</span>
    </section>

    <div id="thought-dots" class="effect thought-dots" aria-hidden="true">
      <i></i><i></i><i></i>
    </div>
    <div id="sleep-effect" class="effect sleep-effect" aria-hidden="true"><i>Z</i><i>Z</i><i>Z</i></div>
    <div id="tool-card" class="effect tool-card" aria-hidden="true">&lt;/&gt;</div>
    <div id="alert-card" class="effect alert-card" aria-hidden="true">!</div>
    <div id="success-rays" class="effect success-rays" aria-hidden="true"></div>

    <div id="pet-shadow" aria-hidden="true"></div>
    <div id="pet-hitbox">
      <img id="pet-sprite" src="assets/claude-crab.png" alt="Claude Code 像素小螃蟹">
    </div>

  </main>
  <script src="../src/presentation-model.cjs"></script>
  <script src="js/pet-2d.js"></script>
</body>
</html>
